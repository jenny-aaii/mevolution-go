    --gold-500:#D8B36A;
    --gold-600:#C19B4E;
    --gold-700:#8F7136;
    --gold-glow:rgba(216,179,106,0.35);
    --text-primary:#F4EFE6;
    --text-secondary:#B7AC99;
    --text-tertiary:#9A9082;
    --border-subtle:rgba(216,179,106,0.12);
    --border-faint:rgba(216,179,106,0.06);
    --danger:#C97B6A;
    --radius-card:18px;
    --radius-sm:10px;
    --font-display:'Space Grotesk', 'Noto Sans TC', sans-serif;
    --font-body:'Noto Sans TC', sans-serif;
    --font-mono:'JetBrains Mono', monospace;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 900px 500px at 50% -10%, rgba(216,179,106,0.10), transparent 60%),
      linear-gradient(180deg, var(--bg-base-2) 0%, var(--bg-base) 100%);
    color:var(--text-primary);
    font-family:var(--font-body);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  a{color:var(--gold-400);text-decoration:none;}
  button{font-family:inherit;cursor:pointer;}
  ::selection{background:var(--gold-glow);}

  :focus-visible{
    outline:2px solid var(--gold-400);
    outline-offset:2px;
    border-radius:6px;
  }

  /* ---------- star mark (signature element) ---------- */
  .star-mark{
    display:inline-block;
    width:1em;height:1em;
    position:relative;
  }
  .star-mark svg{width:100%;height:100%;display:block;}

  @keyframes twinkle{
    0%,100%{opacity:.15; transform:scale(.85);}
    50%{opacity:.9; transform:scale(1);}
  }
  .star-field{
    position:absolute; inset:0; overflow:hidden; pointer-events:none; z-index:0;
  }
  .star-field .dot{
    position:absolute; width:3px; height:3px; border-radius:50%;
    background:var(--gold-300);
    animation:twinkle 4.5s ease-in-out infinite;
  }
  @media (prefers-reduced-motion: reduce){
    .star-field .dot{animation:none; opacity:.35;}
  }

  /* ---------- login screen ---------- */
  #login-screen{
    min-height:100vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    position:relative; padding:32px 20px; text-align:center;
  }
  .login-logo-real{
    width:108px; height:auto; margin-bottom:8px;
    filter:drop-shadow(0 0 24px var(--gold-glow));
  }
  .login-title{
    font-family:var(--font-display); font-weight:700; letter-spacing:.06em;
    font-size:clamp(28px,5vw,42px); margin:0 0 6px;
    background:linear-gradient(95deg, var(--gold-300), var(--gold-600));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .login-sub{
    font-size:14px; color:var(--text-secondary); margin:0 0 40px;
    letter-spacing:.04em;
  }
  .role-picker{
    display:flex; gap:16px; flex-wrap:wrap; justify-content:center;
  }
  .role-card{
    width:200px; padding:26px 20px;
    background:var(--bg-elevated); border:1px solid var(--border-subtle);
    border-radius:var(--radius-card); color:var(--text-primary);
    display:flex; flex-direction:column; align-items:center; gap:10px;
    transition:transform .2s ease, border-color .2s ease, box-shadow .2s ease;
  }
  .role-card:hover{
    transform:translateY(-4px);
    border-color:var(--gold-600);
    box-shadow:0 12px 32px -8px var(--gold-glow);
  }
  .role-emoji{font-size:30px;}
  .avatar.avatar-lg{width:56px; height:56px;}
  .role-name{font-family:var(--font-display); font-weight:600; font-size:17px; color:var(--text-primary);}
  .role-desc{font-size:12.5px; color:var(--text-secondary); line-height:1.5;}
  .tab-chip-row{display:flex; flex-wrap:wrap; gap:5px; justify-content:center; margin-top:2px;}
  .tab-chip{
    font-size:10px; padding:3px 9px; border-radius:999px;
    background:rgba(216,179,106,0.12); color:var(--gold-300);
    border:1px solid var(--border-faint); font-family:var(--font-mono);
  }
  .login-note{
    margin-top:24px; font-size:12px; color:var(--text-tertiary);
    font-family:var(--font-mono);
  }

  .admin-entry-link{
    margin-top:12px; background:none; border:none; color:var(--text-tertiary);
    font-size:11px; font-family:var(--font-mono); cursor:pointer;
    text-decoration:underline; text-underline-offset:3px; opacity:.6;
    transition:opacity .2s;
  }
  .admin-entry-link:hover{opacity:1;}

  .login-form{
    width:100%; max-width:320px; display:flex; flex-direction:column; gap:16px;
    margin-top:8px;
  }
  .login-field{display:flex; flex-direction:column; gap:6px; text-align:left;}
  .login-field span{
    font-size:12px; color:var(--text-secondary); font-family:var(--font-mono);
    letter-spacing:.03em;
  }
  .login-field input{
    background:var(--bg-elevated-2); border:1px solid var(--border-subtle);
    color:var(--text-primary); border-radius:10px; padding:11px 14px;
    font-size:14px; font-family:inherit; transition:border-color .2s;
  }
  .login-field input::placeholder{color:var(--text-tertiary);}
  .login-field input:focus{outline:none; border-color:var(--gold-500);}
  .login-submit{
    margin-top:4px; padding:12px; border-radius:10px; font-size:14.5px; font-weight:700;
  }
  .login-error{
    color:#E8897A; font-size:12.5px; text-align:left; margin:-4px 0 0;
    font-family:var(--font-mono);
  }

  /* ---------- app shell ---------- */
  #app{min-height:100vh; display:flex; flex-direction:column;}
  #app[hidden]{display:none !important;}

  .sticky-head{position:sticky; top:0; z-index:30;}
  header.topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 20px;
    background:rgba(17,13,8,0.86);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border-faint);
  }
  .brand{display:flex; align-items:center; gap:10px; cursor:pointer; background:none; border:none; padding:0; color:var(--text-primary);}
  .brand-logo-real{width:30px; height:auto; display:block;}
  .brand-text{display:flex; flex-direction:column; line-height:1.15; text-align:left;}
  .brand-text b{font-family:var(--font-display); font-weight:700; font-size:15px; letter-spacing:.04em;}
  .brand-text span{font-size:10.5px; color:var(--text-tertiary); letter-spacing:.08em;}

  .topbar-right{display:flex; align-items:center; gap:10px;}
  .role-badge{
    font-size:11.5px; padding:5px 11px; border-radius:999px;
    border:1px solid var(--border-subtle); color:var(--gold-300);
    font-family:var(--font-mono); letter-spacing:.03em;
    display:flex; align-items:center; gap:5px;
  }
  .switch-btn{
    font-size:12px; padding:7px 13px; border-radius:999px;
    background:var(--bg-elevated-2); border:1px solid var(--border-subtle);
    color:var(--text-secondary); transition:border-color .2s, color .2s;
    font-family:inherit; cursor:pointer; max-width:160px;
    -webkit-appearance:none; appearance:none;
  }
  .switch-btn option{background:var(--bg-elevated-2); color:var(--text-primary);}
  .switch-btn:hover{border-color:var(--gold-600); color:var(--gold-300);}

  /* ---------- tab bar (BU / HR) ---------- */
  .tab-bar{
    display:flex; gap:6px; overflow-x:auto;
    padding:10px 20px 0;
    background:rgba(17,13,8,0.86);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border-faint);
    scrollbar-width:none;
  }
  .tab-bar::-webkit-scrollbar{display:none;}
  .tab-btn{
    flex-shrink:0;
    background:none; border:none;
    color:var(--text-tertiary);
    font-family:var(--font-mono); font-size:12.5px; letter-spacing:.03em;
    padding:8px 14px 11px;
    position:relative;
    transition:color .2s ease;
  }
  .tab-btn:hover{color:var(--text-secondary);}
  .tab-btn.active{color:var(--gold-300); font-weight:600;}
  .tab-btn.active::after{
    content:''; position:absolute; left:10px; right:10px; bottom:0;
    height:2px; border-radius:2px;
    background:linear-gradient(90deg, var(--gold-300), var(--gold-600));
  }

  main{flex:1; width:100%; max-width:700px; margin:0 auto; padding:26px 18px 60px;}

  .composer-trigger{
    position:fixed; bottom:32px; right:32px; z-index:100;
    width:52px; height:52px; border-radius:50%;
    background:linear-gradient(135deg,var(--gold-300),var(--gold-600));
    border:none; color:#1a140c;
    display:flex; align-items:center; justify-content:center;
    font-size:24px; font-weight:700; line-height:1;
    box-shadow:0 4px 20px rgba(216,179,106,.35);
    transition:transform .15s, box-shadow .15s;
    cursor:pointer;
  }
  .composer-trigger:hover{transform:scale(1.08); box-shadow:0 6px 28px rgba(216,179,106,.5);}

  /* ---------- post card ---------- */
  .post{
    background:var(--bg-elevated);
    border:1px solid var(--border-faint);
    border-radius:var(--radius-card);
    padding:20px 20px 14px;
    margin-bottom:18px;
    position:relative;
  }
  .post.pinned{border-color:var(--border-subtle); box-shadow:0 0 0 1px var(--border-faint), 0 18px 40px -22px var(--gold-glow);}
  .pin-flag{
    display:inline-flex; align-items:center; gap:5px;
    font-size:11px; color:var(--gold-400); font-family:var(--font-mono);
    margin-bottom:10px; letter-spacing:.04em;
  }
  .post-head{display:flex; align-items:center; gap:11px; margin-bottom:13px;}
  .post-mgmt-btns{margin-left:auto; display:flex; gap:4px; opacity:0; transition:opacity .15s;}
  .post:hover .post-mgmt-btns{opacity:1;}
  .post-mgmt-btn{background:none; border:none; color:var(--text-tertiary); font-size:13px; padding:3px 6px; border-radius:6px; cursor:pointer; transition:color .15s, background .15s;}
  .post-mgmt-btn:hover{color:var(--gold-400); background:var(--bg-elevated-2);}
  .post-mgmt-btn.danger:hover{color:var(--danger); background:rgba(220,60,60,.08);}
  .avatar{
    width:38px;height:38px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-display); font-weight:700; font-size:14px;
    color:var(--bg-base);
  }
  .avatar.instructor{background:var(--gold-300);}
  .avatar.student{background:#DCD2C0; border:1px solid var(--border-subtle);}
  .avatar.hr{background:var(--bg-elevated-3); border:1px solid var(--border-subtle);}
  .avatar.avatar-photo{background:var(--bg-elevated-3); border:1px solid var(--border-subtle); padding:0;}
  .avatar.avatar-photo img{width:100%; height:100%; object-fit:cover; border-radius:50%;}
  .avatar img{width:66%; height:66%; object-fit:contain; display:block;}
  .icon-on-dark{filter:invert(1) brightness(1.35);}
  .post-meta{display:flex; flex-direction:column; gap:2px;}
  .post-name-row{display:flex; align-items:center; gap:7px;}
  .post-name{font-weight:700; font-size:14.5px;}
  .tag-instructor{
    font-size:10px; padding:2px 7px; border-radius:6px;
    background:rgba(216,179,106,0.14); color:var(--gold-300);
    font-family:var(--font-mono); letter-spacing:.03em;
  }
  .tag-student{
    font-size:10px; padding:2px 7px; border-radius:6px;
    background:var(--bg-elevated-3); color:var(--text-tertiary);
    border:1px solid var(--border-faint);
    font-family:var(--font-mono); letter-spacing:.03em;
  }
  .post-time{font-size:11.5px; color:var(--text-tertiary); font-family:var(--font-mono);}

  .post-body{font-size:14.5px; line-height:1.75; color:var(--text-primary); margin-bottom:13px; word-break:break-word;}
  .post-body img{max-width:100%; width:100%; border-radius:8px; margin:8px 0; display:block;}
  .post-body b{color:var(--gold-300);}

  .attachment{
    display:inline-flex; align-items:center; gap:9px;
    padding:9px 13px; margin-bottom:14px;
    background:var(--bg-elevated-2); border:1px solid var(--border-subtle);
    border-radius:var(--radius-sm); font-size:12.5px; max-width:100%;
  }
  .attachment .file-ext{
    width:26px;height:26px; border-radius:6px; flex-shrink:0;
    background:var(--gold-700); color:#1a140c; font-family:var(--font-mono);
    font-size:9px; font-weight:700; display:flex; align-items:center; justify-content:center;
  }
  .attachment .file-name{color:var(--text-primary); font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:220px;}
  .attachment .file-size{color:var(--text-tertiary); font-family:var(--font-mono); font-size:10.5px;}
  .attachment .dl-icon{color:var(--gold-400); margin-left:2px; flex-shrink:0;}

  .post-actions{
    display:flex; align-items:center; gap:18px;
    padding-top:11px; border-top:1px solid var(--border-faint);
  }
  .star-btn{
    display:flex; align-items:center; gap:7px;
    background:none; border:none; color:var(--text-secondary);
    font-size:13px; font-family:var(--font-mono); padding:4px 2px;
    position:relative;
  }
  .star-btn .star-mark{width:17px;height:17px; transition:transform .25s ease;}
  .star-btn .star-mark svg path{transition:fill .25s ease, stroke .25s ease;}
  .star-btn.lit .star-mark svg path{fill:var(--gold-400); stroke:var(--gold-400);}
  .star-btn.lit{color:var(--gold-300);}
  .star-btn.burst .star-mark{animation:pop .4s ease;}
  @keyframes pop{0%{transform:scale(1);}40%{transform:scale(1.45);}100%{transform:scale(1);}}
  @media (prefers-reduced-motion: reduce){.star-btn.burst .star-mark{animation:none;}}

  .comment-toggle{
    background:none; border:none; color:var(--text-secondary);
    font-size:13px; display:flex; align-items:center; gap:6px;
  }
  .comment-toggle:hover, .star-btn:hover{color:var(--gold-300);}
  .chevron{transition:transform .2s ease;}
  .chevron.open{transform:rotate(180deg);}

  /* ---------- comments ---------- */
  .comments{margin-top:14px; padding-top:2px;}
  .comments.collapsed{display:none;}
  .comment{display:flex; gap:9px; padding:10px 0; border-top:1px solid var(--border-faint);}
  .comment:first-child{border-top:none;}
  .comment .avatar{width:28px;height:28px; font-size:11px;}
  .comment-bubble{flex:1; min-width:0;}
  .comment-top{display:flex; align-items:baseline; gap:7px; flex-wrap:wrap;}
  .comment-name{font-weight:700; font-size:12.5px;}
  .comment-time{font-size:10.5px; color:var(--text-tertiary); font-family:var(--font-mono);}
  .comment-edited{font-size:10px; color:var(--text-tertiary); font-family:var(--font-mono); font-style:italic;}
  .comment-text{font-size:13.5px; line-height:1.6; color:var(--text-secondary); margin-top:1px;}
  .comment-actions{display:flex; flex-direction:column; gap:4px; align-self:flex-start;}
  .comment-del{
    background:none; border:none; color:var(--text-tertiary);
    padding:2px; opacity:.6; font-size:12.5px;
  }
  .comment-del:hover{color:var(--danger); opacity:1;}
  .comment-edit-btn{
    background:none; border:none; color:var(--text-tertiary);
    padding:2px; opacity:.6; font-size:12.5px;
  }
  .comment-edit-btn:hover{color:var(--gold-300); opacity:1;}
  .comment-edit-row{display:flex; gap:7px; margin-top:4px; align-items:center;}
  .comment-edit-input{
    flex:1; background:var(--bg-elevated-2); border:1px solid var(--gold-600);
    border-radius:8px; padding:6px 10px; color:var(--text-primary);
    font-size:13px; font-family:inherit;
  }
  .edit-save-btn{
    background:var(--gold-500); color:#1a140c; border:none; border-radius:7px;
    padding:6px 11px; font-size:11.5px; font-weight:700; flex-shrink:0;
  }
  .edit-save-btn:hover{background:var(--gold-400);}
  .edit-cancel-btn{
    background:none; border:1px solid var(--border-subtle); color:var(--text-secondary);
    border-radius:7px; padding:6px 11px; font-size:11.5px; flex-shrink:0;
  }
  .edit-cancel-btn:hover{border-color:var(--gold-600); color:var(--gold-300);}

  .comment-input-row{
    display:flex; gap:8px; margin-top:12px; align-items:flex-start;
  }
  .comment-input-row input{
    flex:1; background:var(--bg-elevated-2); border:1px solid var(--border-subtle);
    border-radius:999px; padding:9px 14px; color:var(--text-primary);
    font-size:13px; font-family:inherit;
  }
  .comment-input-row input::placeholder{color:var(--text-tertiary);}
  .send-btn{
    background:var(--gold-500); color:#1a140c; border:none; border-radius:999px;
    padding:9px 16px; font-size:12.5px; font-weight:700; flex-shrink:0;
    transition:background .2s;
  }
  .send-btn:hover{background:var(--gold-400);}

  /* ---------- composer modal ---------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(8,6,3,0.72);
    display:flex; align-items:center; justify-content:center;
    z-index:100; padding:18px;
  }
  .modal-overlay[hidden]{display:none;}
  .modal{
    width:100%; max-width:560px; max-height:88vh; overflow-y:auto;
    background:var(--bg-elevated); border:1px solid var(--border-subtle);
    border-radius:20px; padding:22px;
  }
  .modal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;}
  .modal-head h3{margin:0; font-family:var(--font-display); font-size:17px; letter-spacing:.02em;}
  .modal-close{background:none; border:none; color:var(--text-tertiary); font-size:20px; line-height:1;}
  .modal-close:hover{color:var(--gold-300);}

  .toolbar{display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap; align-items:center;}
  .toolbar button{
    background:var(--bg-elevated-2); border:1px solid var(--border-subtle);
    color:var(--text-secondary); font-size:12.5px; padding:6px 11px; border-radius:8px;
    display:flex; align-items:center; gap:5px;
  }
  .toolbar button:hover{border-color:var(--gold-600); color:var(--gold-300);}
  .toolbar button.active{background:var(--gold-500); color:#1a140c; border-color:var(--gold-500);}
  .swatch-gold{width:11px; height:11px; border-radius:50%; background:linear-gradient(135deg,var(--gold-300),var(--gold-600)); display:inline-block;}

  /* 調色盤 */
  .color-palette-wrap{position:relative; display:inline-flex;}
  .color-palette-btn{cursor:pointer;}
  .color-palette-pop{
    display:none; position:absolute; top:calc(100% + 6px); left:0; z-index:200;
    background:var(--bg-elevated-3); border:1px solid var(--border-subtle);
    border-radius:10px; padding:8px; gap:5px;
    display:none; flex-wrap:wrap; width:168px;
    box-shadow:0 8px 24px rgba(0,0,0,.4);
  }
  .color-palette-pop.open{display:flex;}
  .cp-swatch{
    width:26px; height:26px; border-radius:6px; border:2px solid transparent;
    cursor:pointer; transition:transform .1s, border-color .1s; flex-shrink:0;
  }
  .cp-swatch:hover{transform:scale(1.15); border-color:rgba(255,255,255,.5);}
  .cp-swatch.reset{background:none; border:2px dashed var(--border-subtle); display:flex; align-items:center; justify-content:center; font-size:11px; color:var(--text-tertiary);}

  /* 字體大小 */
  .font-size-wrap{display:flex; align-items:center; gap:2px; background:var(--bg-elevated-2); border:1px solid var(--border-subtle); border-radius:8px; overflow:hidden;}
  .font-size-wrap button{border:none; background:none; padding:6px 9px; font-size:13px; color:var(--text-secondary); border-radius:0;}
  .font-size-wrap button:hover{background:var(--bg-elevated-3); color:var(--gold-300);}
  .font-size-label{font-size:11px; color:var(--text-tertiary); padding:0 4px; font-family:var(--font-mono);}

  #editor{
    min-height:110px; padding:13px 14px; background:var(--bg-elevated-2);
    border:1px solid var(--border-subtle); border-radius:var(--radius-sm);
    font-size:14px; line-height:1.7; color:var(--text-primary); margin-bottom:12px;
    outline:none;
  }
  #editor:empty::before{content:attr(data-placeholder); color:var(--text-tertiary);}
  #editor b{color:var(--gold-300);}
  #editor img{width:100%; height:100%; border-radius:8px; display:block; object-fit:cover;}
  .editor-img-wrap{position:relative; margin:8px 0; display:inline-block; line-height:0; resize:both; overflow:hidden; max-width:100%; min-width:80px; min-height:40px;}
  .editor-img-wrap:hover .editor-img-del{opacity:1;}
  .editor-img-del{
    position:absolute; top:8px; right:8px; opacity:0;
    background:rgba(0,0,0,.65); color:#fff; border:none;
    width:28px; height:28px; border-radius:50%; font-size:14px;
    cursor:pointer; transition:opacity .15s; display:flex; align-items:center; justify-content:center;
    z-index:10;
  }

  .emoji-row{display:flex; gap:3px; margin-bottom:12px; flex-wrap:wrap;}
  .emoji-row button{background:var(--bg-elevated-2); border:1px solid var(--border-faint); border-radius:8px; font-size:16px; padding:5px 8px;}
  .emoji-row button:hover{border-color:var(--gold-600);}

  .file-row{display:flex; align-items:center; gap:10px; margin-bottom:14px;}
  .file-attach-btn{
    background:var(--bg-elevated-2); border:1px dashed var(--border-subtle);
    color:var(--text-secondary); font-size:12.5px; padding:8px 13px; border-radius:var(--radius-sm);
  }
  .file-attach-btn:hover{border-color:var(--gold-600); color:var(--gold-300);}
  .file-chip-preview{font-size:12px; color:var(--text-secondary); font-family:var(--font-mono);}

  .pin-row{display:flex; align-items:center; gap:8px; margin-bottom:18px; font-size:13px; color:var(--text-secondary);}
  .pin-row input{accent-color:var(--gold-500);}

  .modal-footer{display:flex; justify-content:flex-end; gap:10px;}
  .btn-ghost{background:none; border:1px solid var(--border-subtle); color:var(--text-secondary); padding:9px 18px; border-radius:999px; font-size:13px;}
  .btn-ghost:hover{border-color:var(--gold-600); color:var(--gold-300);}
  .btn-gold{background:linear-gradient(135deg,var(--gold-300),var(--gold-600)); color:#1a140c; border:none; padding:9px 22px; border-radius:999px; font-size:13px; font-weight:700;}
  .btn-gold:hover{filter:brightness(1.06);}

  /* ---------- footer ---------- */
  footer{
    border-top:1px solid var(--border-faint);
    padding:26px 20px 30px;
    display:flex; flex-direction:column; align-items:center; gap:12px;
  }
  .footer-logos{display:flex; align-items:center; gap:18px; opacity:.92;}
  .mdcg-logo-real{height:26px; width:auto; display:block; filter:brightness(1.4);}
  .hakuhodo-mark{display:flex; flex-direction:column; align-items:center; line-height:1.3;}
  .hakuhodo-member{font-family:var(--font-display); font-size:9.5px; color:var(--text-tertiary); letter-spacing:.04em;}
  .hakuhodo-name{font-family:var(--font-display); font-weight:600; font-size:14px; letter-spacing:.12em; color:var(--text-secondary);}
  .hakuhodo-intl{font-family:var(--font-display); font-size:8.5px; color:var(--text-tertiary); letter-spacing:.14em;}
  .footer-sep{width:1px; height:14px; background:var(--border-subtle);}
  footer .copyright{font-size:11px; color:var(--text-tertiary); font-family:var(--font-mono);}

  /* ---------- responsive ---------- */
  @media (max-width:480px){
    header.topbar{padding:12px 14px;}
    .brand-text span{display:none;}
    main{padding:18px 12px 50px;}
    .post{padding:16px 16px 12px;}
    .role-picker{flex-direction:column; align-items:center;}
    .role-card{width:100%; max-width:260px;}
  }

  .empty-hint{
    text-align:center; padding:60px 20px;
    color:var(--text-tertiary); font-size:14px; line-height:2;
    background:var(--bg-elevated); border-radius:var(--radius-card);
    margin-top:20px; border:1px dashed var(--border-subtle);
  }

  /* ---------- admin panel ---------- */
  .admin-modal{max-width:680px;}
  .admin-table-wrap{overflow-x:auto; margin-bottom:18px; border:1px solid var(--border-faint); border-radius:10px;}
  .admin-table{width:100%; border-collapse:collapse; font-size:12.5px;}
  .admin-table th{
    text-align:left; padding:9px 10px; background:var(--bg-elevated-2);
    color:var(--text-tertiary); font-family:var(--font-mono); font-size:10.5px;
    letter-spacing:.03em; border-bottom:1px solid var(--border-faint); white-space:nowrap;
  }
  .admin-table td{padding:9px 10px; border-bottom:1px solid var(--border-faint); vertical-align:middle;}
  .admin-table tr:last-child td{border-bottom:none;}
  .admin-name-cell{font-weight:600; white-space:nowrap;}
  .admin-email-cell{color:var(--text-tertiary); font-family:var(--font-mono); font-size:11px;}
  .admin-editable{
    background:var(--bg-elevated-2); border:1px solid var(--gold-500);
    color:inherit; font:inherit; width:100%; padding:4px 7px; border-radius:6px;
    display:none;
  }
  .admin-editable:focus{outline:none;}
  .admin-row-display{display:inline;}
  .admin-row.editing .admin-row-display{display:none;}
  .admin-row.editing .admin-editable{display:inline-block;}
  .admin-row.editing .admin-edit-btn{display:none;}
  .admin-row.editing .admin-save-btn{display:inline-flex;}
  .admin-edit-btn,.admin-save-btn{background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:6px;font-size:13px;}
  .admin-edit-btn{color:var(--text-tertiary);} .admin-edit-btn:hover{color:var(--gold-300);}
  .admin-save-btn{display:none;color:var(--gold-400);font-weight:700;} .admin-save-btn:hover{color:var(--gold-300);}
  .admin-role-select{
    background:var(--bg-elevated-2); border:1px solid var(--border-subtle); color:var(--text-primary);
    border-radius:7px; padding:4px 8px; font-size:11.5px; font-family:inherit;
  }
  .admin-tab-checks{display:flex; gap:10px; flex-wrap:wrap;}
  .admin-tab-checks label{display:flex; align-items:center; gap:4px; font-size:11px; color:var(--text-secondary); white-space:nowrap;}
  .admin-tab-checks input{accent-color:var(--gold-500);}
  .admin-hr-toggle{display:flex; align-items:center; gap:4px; font-size:11px; color:var(--gold-300); white-space:nowrap;}
  .admin-delete-btn{background:none; border:none; color:var(--text-tertiary); opacity:.6; font-size:13px;}
  .admin-delete-btn:hover{color:var(--danger); opacity:1;}
  .admin-add-row{border-top:1px solid var(--border-faint); padding-top:14px;}
  .admin-add-title, .admin-import-title{font-size:12px; color:var(--text-secondary); margin-bottom:8px;}
  .admin-add-fields{display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;}
  .admin-add-fields input, .admin-add-fields select{
    background:var(--bg-elevated-2); border:1px solid var(--border-subtle); color:var(--text-primary);
    border-radius:8px; padding:8px 10px; font-size:12.5px; font-family:inherit;
  }
  .admin-add-fields input{flex:1; min-width:110px;}
  #importTextarea{
    width:100%; min-height:64px; background:var(--bg-elevated-2); border:1px solid var(--border-subtle);
    color:var(--text-primary); border-radius:8px; padding:9px 11px; font-size:12px; font-family:var(--font-mono);
    margin-bottom:10px; resize:vertical;
  }
  #importTextarea::placeholder{color:var(--text-tertiary);}
</style>
</head>

    const d = document.createElement('div');
    d.className='dot';

  firebase.initializeApp({
    apiKey:"AIzaSyBQ5s8Rvu79XLlEBzWUjD24CXpbdRBokQc",
    authDomain:"mevolution-go.firebaseapp.com",
    projectId:"mevolution-go",
    storageBucket:"mevolution-go.firebasestorage.app",

  });
  const db = firebase.firestore();

  let role = null;
  const TABS = [
    {id:'medialand', label:'Medialand'},
    {id:'mx',        label:'MX'},
    {id:'meshplus',  label:'MESh+'},
    {id:'hr',        label:'HR'}
  ];
  const TAB_IDS = TABS.map(t=>t.id);

  let roster = [];          // local cache from Firestore
  let localPosts = [];      // local cache for current tab
  let openCommentSet = new Set(); // which posts have comments open
  let unsubPosts = null;
  let currentUser = null;
  let currentTab = null;

  // ---------- Firestore: users listener ----------
  db.collection('users').onSnapshot(snapshot=>{
    roster = snapshot.docs.map(d=>({id:d.id,...d.data()}));
    if(currentUser){
      const up = roster.find(u=>u.id===currentUser.id);
      if(up){ currentUser=up; if(!app.hidden) refreshChrome(); }
    }
    const adminOverlayEl = document.getElementById('adminOverlay');
    if(adminOverlayEl && !adminOverlayEl.hidden) renderAdminTable();
  }, err=>console.error('users listener:',err));

  // ---------- Firestore: posts listener ----------
  function subscribeToCurrentTab(){
    if(unsubPosts) unsubPosts();
    localPosts = [];
    unsubPosts = db.collection('posts')
      .where('tab','==',currentTab)
      .onSnapshot(snapshot=>{
        localPosts = snapshot.docs.map(d=>{
          const data=d.data();
          return {
            id:d.id, pinned:data.pinned||false,
            authorRole:data.authorRole, author:data.author,
            time:data.timeLabel||'方才', bodyHTML:data.bodyHTML||'',
            file:data.file||null, likes:data.likes||0,
            likedByMe:data.likedBy&&currentUser?data.likedBy.includes(currentUser.email):false,
            commentsOpen:openCommentSet.has(d.id),
            comments:data.comments||[]
          };
        });

  function renderPost(p){
    const fileBlock = p.file ? (
      p.file.dataUrl
        ? '<a class="attachment" href="'+p.file.dataUrl+'" download="'+p.file.name+'" style="text-decoration:none;">'+
            '<span class="file-ext">'+p.file.ext+'</span>'+

            '<span class="file-name" title="'+p.file.name+'">'+p.file.name+'</span>'+
            '<span class="file-size">'+p.file.size+'</span>'+
          '</div>'
    ) : '';

    function autoLink(html){
      return html.replace(/(https?:\/\/[^\s<"]+)/g,
        '<a href="$1" target="_blank" rel="noopener" style="color:var(--gold-400);word-break:break-all;">$1</a>');
    }

    const tagHTML = roleTagHTML(p.authorRole, p.author);

    const isHR = currentUser && currentUser.allowed && currentUser.allowed.includes('hr');
    const canManagePost = isHR || p.author === currentUser.name;
    const canDeleteComment = isHR || role==='instructor';

    return (
      '<article class="post '+(p.pinned?'pinned':'')+'" data-id="'+p.id+'">'+
        (p.pinned ? '<div class="pin-flag">📌 置頂公告</div>' : '')+
        '<div class="post-head">'+
          avatarHTML(p.authorRole, p.author)+
          '<div class="post-meta">'+
            '<div class="post-name-row"><span class="post-name">'+p.author+'</span>'+
              tagHTML+
            '</div>'+
            '<span class="post-time">'+p.time+'</span>'+
          '</div>'+
          (canManagePost ?
            '<div class="post-mgmt-btns">'+
              '<button class="post-mgmt-btn" data-action="edit-post" data-pid="'+p.id+'" title="編輯">✎</button>'+
              '<button class="post-mgmt-btn danger" data-action="delete-post" data-pid="'+p.id+'" title="刪除">🗑</button>'+
            '</div>'
          : '')+
        '</div>'+
        '<div class="post-body">'+autoLink(p.bodyHTML)+'</div>'+
        fileBlock+
        '<div class="post-actions">'+
          '<button class="star-btn '+(p.likedByMe?'lit':'')+'" data-action="like">'+
            '<span class="star-mark">'+STAR_SVG+'</span><span class="like-count">'+p.likes+'</span>'+
          '</button>'+
          '<button class="comment-toggle" data-action="toggle-comments">💬 留言 '+p.comments.length+' <span class="chevron '+(openCommentSet.has(p.id)?'open':'')+'">⌄</span></button>'+
        '</div>'+
        '<div class="comments '+(openCommentSet.has(p.id)?'':'collapsed')+'">'+
          p.comments.map(c=>renderComment(c, p.id, canDeleteComment)).join('')+
          '<div class="comment-input-row">'+
            '<input type="text" placeholder="留言互動…" data-comment-input="'+p.id+'">'+
            '<button class="send-btn" data-action="send-comment" data-pid="'+p.id+'">送出</button>'+
          '</div>'+
        '</div>'+
      '</article>'
    );
  }

  function escapeHtml(text){
    return String(text)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function roleTagHTML(r, name){
    if(r==='hr') return '<span class="tag-instructor">HR</span>';
    if(r==='instructor'){
      const u = name ? roster.find(x=>x.name===name) : null;
      const isHR = u && u.allowed && u.allowed.includes('hr');

    }
    if(r==='student') return '<span class="tag-student">實習生</span>';
    return '';
  }

      '</div>'
    );
  }


  function bindPostEvents(p){}  // events handled by delegation below

  // ---- 事件委派：統一在 feed 上監聽，避免非同步渲染問題 ----
  feed.addEventListener('click', async(e)=>{
    const action = e.target.dataset.action || e.target.closest('[data-action]')?.dataset.action;
    const btn = e.target.closest('[data-action]');
    if(!btn || !action) return;

    // 找到對應的 post 物件
    const card = btn.closest('.post');
    if(!card) return;
    const pid = card.dataset.id;
    const p = localPosts.find(x=>x.id===pid);

    if(action==='like'){
      if(!p) return;
      const ref = db.collection('posts').doc(pid);
      if(!p.likedByMe){
        await ref.update({likes:firebase.firestore.FieldValue.increment(1),likedBy:firebase.firestore.FieldValue.arrayUnion(currentUser.email)});
      } else {
        await ref.update({likes:firebase.firestore.FieldValue.increment(-1),likedBy:firebase.firestore.FieldValue.arrayRemove(currentUser.email)});
      }
    }

    else if(action==='toggle-comments'){
      if(openCommentSet.has(pid)) openCommentSet.delete(pid);
      else openCommentSet.add(pid);
      renderFeed();
    }

    else if(action==='send-comment'){
      if(!currentUser){ return; }
      const input = card.querySelector('[data-comment-input="'+pid+'"]');
      const text = input?.value.trim(); if(!text) return;
      openCommentSet.add(pid); // 先確保留言區保持開啟
      const nc={id:'c'+Date.now(),role:role,name:currentUser.name,time:'剛剛',text,edited:false,editedTime:null};
      try{
        await db.collection('posts').doc(pid).update({comments:firebase.firestore.FieldValue.arrayUnion(nc)});
        input.value='';
      }catch(err){ console.error('comment error:',err); alert('留言失敗，請稍後再試'); }
    }

    else if(action==='delete-comment'){
      if(!p) return;
      const cid = btn.dataset.cid;
      const newComments = p.comments.filter(c=>c.id!==cid);
      await db.collection('posts').doc(pid).update({comments:newComments});
    }

    else if(action==='delete-post'){
      if(!confirm('確定要刪除這篇貼文嗎？')) return;
      await db.collection('posts').doc(pid).delete();
    }

    else if(action==='edit-post'){
      if(!p) return;
      openComposer(p);
    }

    else if(action==='start-edit'){
      if(!p) return;
      const cid = btn.dataset.cid;
      const c = p.comments.find(x=>x.id===cid); if(!c) return;
      c.editing=true; renderFeed();
    }

    else if(action==='cancel-edit'){
      if(!p) return;
      const cid = btn.dataset.cid;
      const c = p.comments.find(x=>x.id===cid); if(c) c.editing=false; renderFeed();
    }

    else if(action==='save-edit'){
      if(!p) return;
      const cid = btn.dataset.cid;
      const inp = card.querySelector('[data-edit-input="'+pid+':'+cid+'"]'); if(!inp) return;
      const newText = inp.value.trim(); if(!newText) return;
      const newComments = p.comments.map(c=>c.id===cid?{...c,text:newText,edited:true,editedTime:'剛剛',editing:false}:c);
      await db.collection('posts').doc(pid).update({comments:newComments});
    }
  });

  let attachedFile=null;
  const EMOJIS=['😀','😄','😂','🥰','😎','😊','🙌','✨','🎉','👏','🙏','💡','📌','🔥','❤️','👍','👋','💪','🎯','🌟','📢','⚡','🎊','😅','🤔','😭','🥳','🤩','😍','🫶','💯','🎶','📚','✅','⭐','🌈','🍀'];
  emojiRow.innerHTML=EMOJIS.map(e=>'<button data-e="'+e+'">'+e+'</button>').join('');
  emojiPicker.innerHTML=EMOJIS.map(e=>'<button data-ep="'+e+'" style="background:none;border:none;font-size:20px;padding:5px;border-radius:8px;cursor:pointer;line-height:1;">'+e+'</button>').join('');
  document.addEventListener('click',()=>{ emojiPicker.style.display='none'; });
  emojiPicker.addEventListener('click',(e)=>{
    e.stopPropagation();
    const btn=e.target.closest('[data-ep]'); if(!btn) return;
    editor.focus();
    const sel=window.getSelection();
    if(sel&&sel.rangeCount){
      const range=sel.getRangeAt(0);
      range.deleteContents();
      const tn=document.createTextNode(btn.dataset.ep);
      range.insertNode(tn);
      range.setStartAfter(tn); range.collapse(true);
      sel.removeAllRanges(); sel.addRange(range);
    } else { editor.innerHTML+=btn.dataset.ep; }
    emojiPicker.style.display='none';
  });
  emojiPicker.addEventListener('mousedown',e=>e.preventDefault());

  let editingPost=null;
  function openComposer(existingPost){
    editingPost=existingPost||null;
    if(editingPost){
      editor.innerHTML=editingPost.bodyHTML;
      document.getElementById('pinCheck').checked=!!editingPost.pinned;
      document.getElementById('submitComposer').textContent='儲存修改';
    } else {
      document.getElementById('submitComposer').textContent='發布';
    }
    overlay.hidden=false; editor.focus();
  }
  function closeComposer(){
    overlay.hidden=true; editor.innerHTML=''; attachedFile=null;
    filePreview.textContent=''; document.getElementById('pinCheck').checked=false;
    emojiRow.hidden=true; fileInput.value=''; editingPost=null;
    document.getElementById('submitComposer').textContent='發布';
    currentFontSize=14; fontSizeLabel.textContent='14'; editor.style.fontSize='';
    colorPalettePop.classList.remove('open');
  }

  composerTrigger.addEventListener('click',()=>openComposer());
  document.getElementById('closeComposer').addEventListener('click',closeComposer);
  document.getElementById('cancelComposer').addEventListener('click',closeComposer);
  overlay.addEventListener('click',(e)=>{
    if(e.target!==overlay) return;
    if(editor.innerHTML.trim()){
      if(!confirm('確定要放棄這篇貼文嗎？')) return;
    }
    closeComposer();
  });
  document.getElementById('boldBtn').addEventListener('click',()=>{editor.focus();document.execCommand('bold');});

  // 防止 toolbar 點擊搶走 editor 焦點（保留選取範圍）
  document.querySelector('.toolbar').addEventListener('mousedown',(e)=>{
    if(e.target.tagName!=='INPUT') e.preventDefault();
  });
  document.getElementById('colorPalettePop').addEventListener('mousedown',(e)=>{
    e.preventDefault();
  });

  // 調色盤
  const colorPaletteBtn = document.getElementById('colorPaletteBtn');
  const colorPalettePop = document.getElementById('colorPalettePop');
  colorPaletteBtn.addEventListener('click',(e)=>{
    e.stopPropagation();
    colorPalettePop.classList.toggle('open');
  });
  document.addEventListener('click',()=>colorPalettePop.classList.remove('open'));
  colorPalettePop.addEventListener('click',(e)=>{
    e.stopPropagation();
    const swatch = e.target.closest('.cp-swatch');
    if(!swatch) return;
    if(swatch.dataset.color==='remove'){
      document.execCommand('removeFormat');
    } else {
      document.execCommand('foreColor',false,swatch.dataset.color);
    }
    colorPalettePop.classList.remove('open');
  });

  // 字體大小：反白選取時只改選取範圍，沒選取時改整個編輯框預設
  let currentFontSize = 14;
  const fontSizeLabel = document.getElementById('fontSizeLabel');
  const FONT_SIZES = [12,13,14,15,16,18,20,22,24,28,32];

  function applyFontSize(size){
    fontSizeLabel.textContent = size;
    currentFontSize = size;
    const sel = window.getSelection();
    if(sel && sel.rangeCount && !sel.isCollapsed){
      try {
        const range = sel.getRangeAt(0);
        const frag = range.extractContents();
        const span = document.createElement('span');
        span.style.fontSize = size+'px';
        span.appendChild(frag);
        range.insertNode(span);
        sel.removeAllRanges();
        const nr = document.createRange();
        nr.selectNodeContents(span);
        sel.addRange(nr);
      } catch(e) {
        editor.style.fontSize = size+'px';
      }
    } else {
      editor.style.fontSize = size+'px';
    }
  }

  document.getElementById('fontSizeUpBtn').addEventListener('click',()=>{
    const idx = FONT_SIZES.indexOf(currentFontSize);
    applyFontSize(idx < FONT_SIZES.length-1 ? FONT_SIZES[idx+1] : currentFontSize);
  });
  document.getElementById('fontSizeDownBtn').addEventListener('click',()=>{
    const idx = FONT_SIZES.indexOf(currentFontSize);
    applyFontSize(idx > 0 ? FONT_SIZES[idx-1] : currentFontSize);
  });


  // 插入圖片
  const imgInsertBtn = document.getElementById('imgInsertBtn');
  const imgFileInput = document.getElementById('imgFileInput');
  imgInsertBtn.addEventListener('click',(e)=>{
    if(e.target===imgInsertBtn || e.target.tagName!=='INPUT') imgFileInput.click();
  });
  imgFileInput.addEventListener('change',()=>{
    const file = imgFileInput.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      const img = new Image();
      img.onload = ()=>{
        const canvas = document.createElement('canvas');
        const maxW = 800;
        const ratio = Math.min(1, maxW/img.width);
        canvas.width = img.width*ratio;
        canvas.height = img.height*ratio;
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
        // 插入帶刪除按鈕的 wrapper（contenteditable=false 讓整塊可以直接用 Backspace 刪）
        const wrapper = document.createElement('div');
        wrapper.className = 'editor-img-wrap';
        wrapper.contentEditable = 'false';
        wrapper.innerHTML = '<img src="'+dataUrl+'" style="width:100%;border-radius:8px;"><button class="editor-img-del" title="刪除圖片">✕</button>';
        // 插到游標位置
        const sel = window.getSelection();
        if(sel && sel.rangeCount){
          const range = sel.getRangeAt(0);
          range.collapse(false);
          range.insertNode(wrapper);
          // 在圖片後面插入空白段落，讓游標有地方繼續打字
          const p = document.createElement('p');
          p.appendChild(document.createTextNode('\u200B'));
          wrapper.after(p);
          // 把游標移到空白段落裡
          const newRange = document.createRange();
          newRange.setStart(p, 0);
          newRange.collapse(true);
          sel.removeAllRanges();
          sel.addRange(newRange);
        } else {
          editor.appendChild(wrapper);
        }
        editor.focus();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
    imgFileInput.value='';
  });

  // 刪除圖片按鈕（用 mousedown 避免 contenteditable 吃掉 click）
  editor.addEventListener('mousedown',(e)=>{
    const delBtn = e.target.closest('.editor-img-del');
    if(delBtn){
      e.preventDefault();
      e.stopPropagation();
      delBtn.closest('.editor-img-wrap').remove();
    }
  });


  document.getElementById('emojiToggleBtn').addEventListener('click',(e)=>{
    e.stopPropagation();
    const isOpen=emojiPicker.style.display==='flex';
    emojiPicker.style.display=isOpen?'none':'flex';
    emojiPicker.style.flexWrap='wrap';
  });
  emojiRow.addEventListener('click',(e)=>{
    const btn=e.target.closest('button[data-e]'); if(!btn) return;
    editor.focus(); document.execCommand('insertText',false,btn.dataset.e);
  });
  fileInput.addEventListener('change',()=>{
    const f=fileInput.files[0]; if(!f) return;
    const ext=(f.name.split('.').pop()||'FILE').toUpperCase().slice(0,4);
    const sizeKB=f.size/1024;
    const sizeLabel=sizeKB>1024?(sizeKB/1024).toFixed(1)+' MB':Math.max(1,Math.round(sizeKB))+' KB';
    if(f.size > 5*1024*1024){ // 超過 5MB 不允許
      alert('檔案大小不可超過 5MB，請壓縮後再上傳。');
      fileInput.value=''; return;
    }
    const reader = new FileReader();
    reader.onload = (ev)=>{
      attachedFile={name:f.name, ext:ext, size:sizeLabel, dataUrl:ev.target.result};
      filePreview.textContent='已選擇：'+f.name+' （'+sizeLabel+'）';
    };
    reader.readAsDataURL(f);
  });

  document.getElementById('submitComposer').addEventListener('click',async()=>{
    const html=editor.innerHTML.trim(); if(!html){editor.focus();return;}
    const pinned=document.getElementById('pinCheck').checked;
    const submitBtn=document.getElementById('submitComposer');
    submitBtn.disabled=true;
    const origText=submitBtn.textContent;
    submitBtn.textContent='發布中…';
    try{
      if(editingPost){
        // 編輯模式：先存 ID，closeComposer 會清掉 editingPost
        const postId=editingPost.id;
        if(pinned){
          currentPosts().forEach(p=>{if(p.id!==postId) p.pinned=false;});
        }
        editingPost.bodyHTML=html;
        editingPost.pinned=pinned;
        closeComposer();
        renderFeed();
        // 非同步寫入 Firestore（用已存的 postId）
        if(pinned){
          const snap=await db.collection('posts').where('tab','==',currentTab).where('pinned','==',true).get();
          const batch=db.batch();
          snap.docs.filter(d=>d.id!==postId).forEach(d=>batch.update(d.ref,{pinned:false}));
          await batch.commit();
        }
        await db.collection('posts').doc(postId).update({bodyHTML:html,pinned});
      } else {
        // 新增模式：先加到本地 localPosts 立即顯示，再寫 Firestore
        const tempId='tmp'+Date.now();
        const newPost={
          id:tempId, tab:currentTab, pinned, authorRole:role, author:currentUser.name,
          time:'剛剛', bodyHTML:html, file:attachedFile||null,
          likes:0, likedByMe:false, commentsOpen:false, comments:[]
        };
        if(pinned) currentPosts().forEach(p=>p.pinned=false);
        localPosts.unshift(newPost);
        closeComposer();
        renderFeed();
        // 非同步寫入 Firestore
        if(pinned){
          const snap=await db.collection('posts').where('tab','==',currentTab).where('pinned','==',true).get();
          const batch=db.batch();
          snap.docs.forEach(d=>batch.update(d.ref,{pinned:false}));
          await batch.commit();
        }
        const docRef=await db.collection('posts').add({
          tab:currentTab, authorRole:role, author:currentUser.name,
          bodyHTML:html, pinned, likes:0, likedBy:[], file:attachedFile||null,
          comments:[], timestamp:firebase.firestore.FieldValue.serverTimestamp(), timeLabel:'剛剛'
        });
        // 把臨時 ID 換成真實 Firestore ID
        const idx=localPosts.findIndex(p=>p.id===tempId);
        if(idx>=0) localPosts[idx].id=docRef.id;
      }
    }catch(err){
      console.error('post error:',err);
      alert('發布失敗：'+err.message);
    }finally{
      submitBtn.disabled=false;
      submitBtn.textContent=origText;
    }
  });


})();
</script>
</body>
</html>
